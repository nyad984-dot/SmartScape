services:
  db:
    image: postgres:15-alpine
    container_name: smartscape-db
    environment:
      POSTGRES_DB: smartscape-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: smartscape-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/smartscape-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      GEMINI_API_KEY: ${GEMINI_API_KEY}

volumes:
  postgres_data: